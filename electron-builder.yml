copyright: Copyright © 2022-2026

linux:
   target:
     - target: AppImage
       arch:
         - x64

files:
  filter:
    - "**/*"
    - "!snap*.json*"
    - "!node_modules/playwright-core/bin"
    - "!**/node_modules/.bin"
    - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
    - "!**/{test,__tests__,tests,powered-test,example,examples}"
    - "!**/{npm-debug.log,yarn.lock,.yarn-metadata.json,bower.json}"
    - "!**/{CHANGELOG*,History*,README*,readme*,LICENSE*,license*,Copyright*,NOTICE*}"
    - "!**/{appveyor.yml,.travis.yml,circle.yml,.eslintrc.*,.editorconfig}"
    - "!**/{*.umd.js,*.umd.bundle.js,*.ts,*.ts.map,*.js.map,*.mjs.map,*.scss,*.css.map}"
    - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes,.github}"
    - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vscode,.log}"
